# frontend.lock.yaml — pins the frontend SOURCE the onboarding wizard bundle
# is built from.
#
# The ha-core + frontend fork is archived; it stays a *build-time input only*,
# pinned here by exact commit so the produced bundle is reproducible. The
# producer (scripts/build_bundle.sh) clones this repo at `ref`, runs the
# frontend build, and vendors the `greenautarky-setup` entry artifacts into
# src/greenautarky_onboarding/frontend_bundle/.
#
# To ship a panel change:
#   1. land the change on the frontend fork,
#   2. bump `ref` below to the merged commit,
#   3. run scripts/build_bundle.sh (or let release CI do it),
#   4. cut a release (tag vX.Y.Z).
lock_version: 1

frontend:
  repo: https://github.com/greenautarky/frontend.git
  # Commit on the frontend fork the bundle is built from.
  # ⚠ Currently the #498 copy-fix BRANCH commit — repin to the merged main
  #   SHA once greenautarky/frontend PR "fix/onboarding-feedback-498" lands.
  ref: "6a4704e52"
  # Entry name registered in build-scripts/bundle.cjs.
  entry: greenautarky-setup
  # Full production build; emits hashed chunks into hass_frontend/frontend_*.
  build_cmd: "yarn install --immutable && yarn build"
  # Build output root inside the frontend checkout.
  output_root: hass_frontend
