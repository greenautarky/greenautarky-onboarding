# frontend.lock.yaml — provenance for the committed wizard bundle.
#
# The wizard bundle ships COMMITTED in
# src/greenautarky_site/frontend_bundle/ and is verified by content-hash
# (frontend_bundle/SHA256SUMS):
#
#   * The committed bytes are the source of truth. `scripts/build_bundle.sh
#     --check` re-verifies their sha256 offline (release CI + ci.yml).
#   * greenautarky/frontend was UN-ARCHIVED 2026-07-09 and the provenance
#     branches pushed, so the pinned ref is reachable again: `--regen` works
#     both locally AND via the manual `produce-bundle` workflow
#     (workflow_dispatch), which builds on a runner and opens a PR with the
#     new bytes. Hash verification stays the gate either way.
#
# This block records WHERE the committed bytes came from and HOW to rebuild
# them (`scripts/build_bundle.sh --regen`).
lock_version: 2

frontend:
  repo: https://github.com/greenautarky/frontend.git
  # Branch ga/subuser-join-consent (1 commit on ga/onboarding-498-plus-subuser
  # @66601617d) — adds the required Datenschutz consent checkbox to the
  # sub-user join step (ADR-0006 open point, best-effort). PUSHED to the
  # remote (reachable ref).
  # Branch ga/wizard-selfcontained-512 (1 commit on f22fdb47e) — #512: the
# wizard entry now builds as a DEDICATED compilation (gulp build-ga-wizard)
# on the component's own publicPath, because the vendored
# bundle only ships greenautarky-setup.* and code-split chunks 404 on a
# stock Core (/frontend_latest belongs to the ha-frontend PyPI package).
  ref: "2d0609e2e"
  entry: greenautarky-setup
  # Install deps first so --regen works on a fresh clone (CI runner or a fresh
  # local checkout). corepack pins the yarn the repo declares; idempotent when
  # node_modules is already present.
  build_cmd: "corepack enable && yarn install --immutable && ./node_modules/.bin/gulp build-ga-wizard"
  output_root: hass_frontend
