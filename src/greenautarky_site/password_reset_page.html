<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>greenautarky KI-Butler — Passwort zurücksetzen</title>
<style>
  :root {
    --ga-primary: #2B5A2A;
    --ga-primary-light: #3D7B3B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
    color: #212121;
    background: #fafafa;
    min-height: 100vh;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 48px 24px; }
  .card {
    background: #fff; border-radius: 16px; padding: 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .brand-block { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .ga-logo { width: 64px; height: 64px; }
  .brand-tagline { font-size: 13px; color: #5a5a5a; margin: 8px 0 0 0; }
  .brand-tagline strong { color: var(--ga-primary); }
  h1 { color: var(--ga-primary); font-size: 1.5rem; margin: 0 0 8px 0; }
  h2 { color: var(--ga-primary); font-size: 1.1rem; margin: 24px 0 8px 0; }
  p { line-height: 1.5; margin: 8px 0; }
  label { display: block; font-size: 14px; font-weight: 500; margin: 16px 0 4px 0; }
  input, select {
    display: block; width: 100%; padding: 12px; margin: 4px 0;
    border: 1px solid #ddd; border-radius: 8px; font-size: 16px;
    font-family: inherit; background: #fff;
  }
  input:focus, select:focus {
    outline: none; border-color: var(--ga-primary);
    box-shadow: 0 0 0 2px rgba(43,90,42,0.2);
  }
  .pin-input {
    text-align: center; font-size: 24px; letter-spacing: 8px;
    font-weight: 600;
  }
  .btn-primary {
    display: block; width: 100%; padding: 12px 24px; margin-top: 24px;
    background: var(--ga-primary); color: white; border: none;
    border-radius: 8px; font-size: 16px; cursor: pointer; font-family: inherit;
  }
  .btn-primary:hover { background: var(--ga-primary-light); }
  .btn-primary:disabled { background: #999; cursor: not-allowed; }
  .btn-secondary {
    display: inline-block; margin-top: 16px; color: var(--ga-primary);
    text-decoration: none; font-size: 14px;
  }
  .btn-secondary:hover { text-decoration: underline; }
  .error { color: #d32f2f; font-size: 13px; margin-top: 8px; }
  .success-msg {
    background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px;
    padding: 16px; text-align: center; color: var(--ga-primary);
  }
  .countdown { color: #666; font-size: 13px; margin-top: 4px; }
  .strength-bar {
    display: flex; gap: 4px; margin-top: 8px; height: 4px;
  }
  .strength-bar span {
    flex: 1; border-radius: 2px; background: #e0e0e0;
    transition: background 0.2s;
  }
  .strength-0 .strength-bar span:nth-child(1) { background: #d32f2f; }
  .strength-1 .strength-bar span:nth-child(1),
  .strength-1 .strength-bar span:nth-child(2) { background: #ff9800; }
  .strength-2 .strength-bar span:nth-child(1),
  .strength-2 .strength-bar span:nth-child(2),
  .strength-2 .strength-bar span:nth-child(3) { background: #ffc107; }
  .strength-3 .strength-bar span:nth-child(1),
  .strength-3 .strength-bar span:nth-child(2),
  .strength-3 .strength-bar span:nth-child(3),
  .strength-3 .strength-bar span:nth-child(4) { background: #4caf50; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="brand-block">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="ga-logo">
        <circle cx="100" cy="100" r="90" fill="#2B5A2A"/>
        <text x="100" y="115" text-anchor="middle" fill="white"
              font-size="48" font-weight="bold" font-family="Arial,sans-serif">GA</text>
      </svg>
    </div>
    <p class="brand-tagline">
      <strong>greenautarky KI-Butler</strong> powered by Home Assistant
    </p>

    <!-- Step 1: PIN -->
    <div id="step-pin">
      <h1>Passwort zurücksetzen</h1>
      <p>Gib die 6-stellige PIN ein, die auf dem Aufkleber deines Geräts steht.</p>
      <label for="pin">Geräte-PIN</label>
      <input type="text" id="pin" class="pin-input" maxlength="7"
             placeholder="___-___" autocomplete="off" inputmode="numeric">
      <div id="pin-error" class="error hidden"></div>
      <div id="pin-countdown" class="countdown hidden"></div>
      <button id="btn-pin" class="btn-primary">PIN prüfen</button>
      <a href="/" class="btn-secondary">Zurück zur Anmeldung</a>
    </div>

    <!-- Step 2: User + Password -->
    <div id="step-password" class="hidden">
      <h1>Neues Passwort setzen</h1>
      <label for="user-select">Benutzer</label>
      <select id="user-select"></select>

      <label for="new-pw">Neues Passwort</label>
      <input type="password" id="new-pw" autocomplete="new-password"
             placeholder="Mindestens 8 Zeichen">
      <div id="pw-strength" class="strength-bar">
        <span></span><span></span><span></span><span></span>
      </div>

      <label for="confirm-pw">Passwort bestätigen</label>
      <input type="password" id="confirm-pw" autocomplete="new-password"
             placeholder="Passwort wiederholen">
      <div id="pw-error" class="error hidden"></div>
      <button id="btn-reset" class="btn-primary" disabled>Passwort ändern</button>
    </div>

    <!-- Step 3: Success -->
    <div id="step-success" class="hidden">
      <div class="success-msg">
        <h1>Passwort geändert</h1>
        <p>Dein Passwort wurde erfolgreich zurückgesetzt.</p>
        <a href="/" style="display:inline-block;margin-top:16px;color:var(--ga-primary);font-weight:500;">
          Zur Anmeldung
        </a>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var pinInput = document.getElementById("pin");
  var btnPin = document.getElementById("btn-pin");
  var pinError = document.getElementById("pin-error");
  var pinCountdown = document.getElementById("pin-countdown");
  var stepPin = document.getElementById("step-pin");
  var stepPassword = document.getElementById("step-password");
  var stepSuccess = document.getElementById("step-success");
  var userSelect = document.getElementById("user-select");
  var newPw = document.getElementById("new-pw");
  var confirmPw = document.getElementById("confirm-pw");
  var pwError = document.getElementById("pw-error");
  var btnReset = document.getElementById("btn-reset");
  var pwStrength = document.getElementById("pw-strength");

  var currentPin = "";
  var countdownTimer = null;

  // --- PIN input formatting ---
  pinInput.addEventListener("input", function() {
    var raw = this.value.replace(/\D/g, "").slice(0, 6);
    if (raw.length > 3) {
      this.value = raw.slice(0, 3) + "-" + raw.slice(3);
    } else {
      this.value = raw;
    }
    // Auto-submit on 6 digits
    if (raw.length === 6) {
      submitPin();
    }
  });

  pinInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") submitPin();
  });

  btnPin.addEventListener("click", submitPin);

  async function submitPin() {
    var raw = pinInput.value.replace(/\D/g, "");
    if (raw.length !== 6) {
      showError(pinError, "Bitte gib eine 6-stellige PIN ein.");
      return;
    }

    btnPin.disabled = true;
    btnPin.textContent = "Wird geprüft...";
    hideError(pinError);

    try {
      var resp = await fetch("/api/greenautarky_site/password_reset/users", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pin: raw }),
      });
      var data = await resp.json();

      if (resp.status === 429) {
        showError(pinError, "Zu viele Versuche.");
        startCountdown(data.retry_after || 60);
        return;
      }

      if (resp.status === 401) {
        showError(pinError, "Ungültige PIN. Versuch " + data.attempts + ".");
        if (data.retry_after > 0) {
          startCountdown(data.retry_after);
        }
        pinInput.value = "";
        pinInput.focus();
        return;
      }

      if (resp.status === 404) {
        showError(pinError, data.error || "Keine PIN auf diesem Gerät konfiguriert.");
        return;
      }

      if (data.status === "ok") {
        currentPin = raw;
        populateUsers(data.users || []);
        stepPin.classList.add("hidden");
        stepPassword.classList.remove("hidden");
        newPw.focus();
      }
    } catch (e) {
      showError(pinError, "Verbindungsfehler: " + esc(e.message));
    } finally {
      btnPin.disabled = false;
      btnPin.textContent = "PIN prüfen";
    }
  }

  function populateUsers(users) {
    userSelect.innerHTML = "";
    if (users.length === 0) {
      var opt = document.createElement("option");
      opt.textContent = "Kein Benutzer verfügbar";
      opt.disabled = true;
      userSelect.appendChild(opt);
      btnReset.disabled = true;
      return;
    }
    for (var i = 0; i < users.length; i++) {
      var opt = document.createElement("option");
      opt.value = users[i].username;
      opt.textContent = users[i].name + " (" + users[i].username + ")";
      userSelect.appendChild(opt);
    }
  }

  // --- Password validation ---
  function scorePassword(pw) {
    if (!pw) return -1;
    var score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
    if (/\d/.test(pw)) score++;
    if (/[^a-zA-Z0-9]/.test(pw)) score++;
    return Math.min(score - 1, 3); // 0-3
  }

  newPw.addEventListener("input", function() {
    var s = scorePassword(this.value);
    pwStrength.parentElement.className = s >= 0 ? "strength-" + s : "";
    // Remove old class, set new
    for (var c = 0; c <= 3; c++) {
      stepPassword.classList.remove("strength-" + c);
    }
    if (s >= 0) stepPassword.classList.add("strength-" + s);
    validatePasswords();
  });

  confirmPw.addEventListener("input", validatePasswords);

  function validatePasswords() {
    var pw = newPw.value;
    var cpw = confirmPw.value;
    var valid = pw.length >= 8 && cpw === pw;
    btnReset.disabled = !valid;

    if (cpw && cpw !== pw) {
      showError(pwError, "Passwörter stimmen nicht überein.");
    } else if (pw && pw.length < 8) {
      showError(pwError, "Mindestens 8 Zeichen erforderlich.");
    } else {
      hideError(pwError);
    }
  }

  btnReset.addEventListener("click", submitReset);

  async function submitReset() {
    var username = userSelect.value;
    var password = newPw.value;

    if (!username || password.length < 8) return;

    btnReset.disabled = true;
    btnReset.textContent = "Wird gespeichert...";
    hideError(pwError);

    try {
      var resp = await fetch("/api/greenautarky_site/password_reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          pin: currentPin,
          username: username,
          new_password: password,
        }),
      });
      var data = await resp.json();

      if (data.status === "ok") {
        stepPassword.classList.add("hidden");
        stepSuccess.classList.remove("hidden");
        return;
      }

      if (resp.status === 401) {
        // PIN expired or wrong — go back to PIN step
        showError(pinError, "PIN-Sitzung abgelaufen. Bitte erneut eingeben.");
        stepPassword.classList.add("hidden");
        stepPin.classList.remove("hidden");
        pinInput.value = "";
        pinInput.focus();
        return;
      }

      showError(pwError, data.error || data.message || "Fehler beim Zurücksetzen.");
    } catch (e) {
      showError(pwError, "Verbindungsfehler: " + esc(e.message));
    } finally {
      btnReset.disabled = false;
      btnReset.textContent = "Passwort ändern";
    }
  }

  // --- Helpers ---
  function showError(el, msg) {
    el.textContent = msg;
    el.classList.remove("hidden");
  }

  function hideError(el) {
    el.classList.add("hidden");
  }

  function startCountdown(seconds) {
    if (countdownTimer) clearInterval(countdownTimer);
    var remaining = seconds;
    pinCountdown.classList.remove("hidden");
    btnPin.disabled = true;
    pinInput.disabled = true;

    function tick() {
      if (remaining <= 0) {
        clearInterval(countdownTimer);
        pinCountdown.classList.add("hidden");
        btnPin.disabled = false;
        pinInput.disabled = false;
        pinInput.focus();
        return;
      }
      var m = Math.floor(remaining / 60);
      var s = remaining % 60;
      pinCountdown.textContent = "Nächster Versuch in " +
        (m > 0 ? m + " Min " : "") + s + " Sek";
      remaining--;
    }
    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  // Focus PIN input on load
  pinInput.focus();
})();
</script>
</body>
</html>
